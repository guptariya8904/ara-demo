name: ARA Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t ara-demo .

    - name: Run Container
      run: |
        docker stop ara-container || true
        docker rm ara-container || true
        docker run -d -p 8080:80 --name ara-container ara-demo